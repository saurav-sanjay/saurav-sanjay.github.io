  <body class="color-app-background">
    <div id="root"></div>
    <div class="widget-container">
      <!-- Add more cards here -->
      <bsky-widget
        data-handle="saurav-sanjay.github.io"
        class="widget"
      ></bsky-widget>
    </div>
  </body>

  <script>
    const getContent = async () => {
      try {
        const response = await fetch("../profile-widget.html");
        const content = await response.text();

        const profileDoc = new DOMParser().parseFromString(
          content,
          "text/html"
        );

        const projectsList = profileDoc.getElementById("profile_projects_list");
        if (projectsList) {
          projectsList.style.display = "none";
        }

        document.getElementById("root").innerHTML = profileDoc.body.innerHTML;
      } catch (error) {
        console.log(error);
      }
    };

    getContent();
  </script>

  <script
    src="https://unpkg.com/bsky-widget@~0.0/dist/index.js"
    type="module"
  ></script>
